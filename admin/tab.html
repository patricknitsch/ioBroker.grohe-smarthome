<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grohe Smarthome – Device Overview</title>
    <script src="../../socket.io/socket.io.js"></script>
    <style>
        :root{--bg:#0a1929;--surface:#0d2137;--surface2:#0f2a48;--text:#ddeeff;--text-muted:#6b9bbf;
        --accent:#29b6f6;--border:#1a3a5c;--shadow:0 2px 12px rgba(0,0,0,.6);
        --sense-accent:#4fc3f7;--guard-accent:#0288d1;--blue-accent:#26c6da;
        --warn:#ff9800;--danger:#ef5350;--success:#66bb6a;
        --valve-open-bg:rgba(102,187,106,.15);--valve-open-fg:#66bb6a;
        --valve-closed-bg:rgba(239,83,80,.15);--valve-closed-fg:#ef5350;}
        @media(prefers-color-scheme:light){:root{--bg:#e3f2fd;--surface:#fff;--surface2:#f5f9ff;
        --text:#0d2137;--text-muted:#4a7fa0;--accent:#0277bd;--border:#b3d9f0;
        --shadow:0 1px 5px rgba(0,60,120,.18);--sense-accent:#0288d1;--guard-accent:#01579b;
        --blue-accent:#00838f;--warn:#e65100;--danger:#c62828;--success:#2e7d32;
        --valve-open-bg:rgba(46,125,50,.12);--valve-open-fg:#2e7d32;
        --valve-closed-bg:rgba(198,40,40,.12);--valve-closed-fg:#c62828;}}
        *{box-sizing:border-box;margin:0;padding:0}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif;
            background:var(--bg);color:var(--text);padding:20px;font-size:14px;min-height:100vh}
        .intro-bar{display:flex;align-items:center;justify-content:space-between;gap:12px;
            flex-wrap:wrap;margin-bottom:24px;padding-bottom:16px;border-bottom:1px solid var(--border)}
        .intro-text{font-size:14px;color:var(--text-muted);flex:1;min-width:200px}
        .config-btn{display:inline-flex;align-items:center;gap:6px;background:transparent;color:var(--accent);
            border:1.5px solid var(--accent);border-radius:6px;padding:7px 16px;cursor:pointer;
            font-size:13px;font-weight:600;white-space:nowrap;flex-shrink:0;font-family:inherit;
            transition:background .15s,color .15s}
        .config-btn:hover{background:var(--accent);color:var(--bg)}
        .device-group{margin-bottom:32px}
        .group-title{display:flex;align-items:center;gap:10px;font-size:16px;font-weight:700;
            margin-bottom:14px;color:var(--text)}
        .group-icon{width:18px;height:18px;border-radius:50%;flex-shrink:0}
        .sense-icon{background:var(--sense-accent)}.guard-icon{background:var(--guard-accent)}
        .blue-icon{background:var(--blue-accent)}
        .device-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;
            box-shadow:var(--shadow);margin-bottom:16px;overflow:hidden}
        .card-header{display:flex;align-items:center;gap:12px;padding:14px 18px;
            background:var(--surface2);border-bottom:1px solid var(--border);flex-wrap:wrap}
        .dot{display:inline-block;width:12px;height:12px;border-radius:50%;background:var(--accent);
            box-shadow:0 0 6px var(--accent);flex-shrink:0}
        .dot.inactive{background:#888;box-shadow:none}
        .card-device-name{font-size:16px;font-weight:700;flex:1;min-width:120px}
        .valve-badge{display:inline-flex;align-items:center;gap:5px;padding:4px 12px;
            border-radius:14px;font-size:13px;font-weight:700;letter-spacing:.02em}
        .valve-badge-open{background:var(--valve-open-bg);color:var(--valve-open-fg)}
        .valve-badge-closed{background:var(--valve-closed-bg);color:var(--valve-closed-fg)}
        .valve-badge-dot{width:8px;height:8px;border-radius:50%;background:currentColor}
        .update-badge{display:inline-block;padding:3px 9px;border-radius:12px;font-size:11px;
            font-weight:600;background:rgba(255,152,0,.18);color:var(--warn)}
        .data-section{padding:12px 18px;border-bottom:1px solid var(--border)}
        .data-section:last-child{border-bottom:none}
        .sec-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;
            color:var(--text-muted);margin-bottom:10px;display:flex;align-items:center;gap:6px}
        .sec-title::after{content:'';flex:1;height:1px;background:var(--border)}
        .prop-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:8px 16px}
        .prop-item{display:flex;flex-direction:column;gap:2px}
        .prop-label{font-size:11px;color:var(--text-muted);font-weight:500}
        .prop-value{font-size:13px;font-weight:600;color:var(--text)}
        .prop-value.ok{color:var(--success)}.prop-value.warn{color:var(--warn)}.prop-value.danger{color:var(--danger)}
        .progress-wrap{display:flex;align-items:center;gap:8px}
        .progress-track{flex:1;height:7px;background:var(--border);border-radius:4px;
            overflow:hidden;min-width:60px;max-width:120px}
        .progress-fill{height:100%;border-radius:4px;background:var(--accent);transition:width .4s}
        .progress-label{font-size:12px;font-weight:700;white-space:nowrap}
        .notif-row{display:flex;gap:12px;align-items:flex-start;flex-wrap:wrap}
        .notif-message{flex:1;min-width:200px}
        .notif-time{font-size:12px;color:var(--text-muted);white-space:nowrap}
        .notif-category{display:inline-block;padding:2px 7px;border-radius:10px;font-size:11px;
            font-weight:600;margin-right:6px;background:rgba(41,182,246,.12);color:var(--accent)}
        .notif-category.alarm{background:rgba(239,83,80,.15);color:var(--danger)}
        .notif-category.warning{background:rgba(255,152,0,.15);color:var(--warn)}
        #loading{text-align:center;padding:60px;color:var(--text-muted);font-size:16px}
        #loading::after{content:'';display:block;width:32px;height:32px;border:3px solid var(--border);
            border-top-color:var(--accent);border-radius:50%;animation:spin .9s linear infinite;margin:16px auto 0}
        @keyframes spin{to{transform:rotate(360deg)}}
        #error-msg{background:rgba(239,83,80,.12);border:1px solid rgba(239,83,80,.4);color:#ef5350;
            padding:12px 16px;border-radius:6px;margin-bottom:16px;display:none;font-size:13px}
        #refresh-info{font-size:11px;color:var(--text-muted);text-align:right;margin-top:8px}
        #content{display:none}
        #no-devices{text-align:center;color:var(--text-muted);padding:40px;font-size:14px;display:none}
    </style>
</head>
<body>
<div id="error-msg"></div>
<div id="loading"></div>
<div id="content">
    <div class="intro-bar">
        <span id="intro-text" class="intro-text"></span>
        <button class="config-btn" id="config-btn"></button>
    </div>
    <div id="sense-group" class="device-group" style="display:none">
        <div class="group-title"><span class="group-icon sense-icon"></span><span id="h-sense"></span></div>
        <div id="sense-cards"></div>
    </div>
    <div id="guard-group" class="device-group" style="display:none">
        <div class="group-title"><span class="group-icon guard-icon"></span><span id="h-guard"></span></div>
        <div id="guard-cards"></div>
    </div>
    <div id="blue-group" class="device-group" style="display:none">
        <div class="group-title"><span class="group-icon blue-icon"></span><span id="h-blue"></span></div>
        <div id="blue-cards"></div>
    </div>
    <div id="no-devices"></div>
    <div id="refresh-info"></div>
</div>

daily:'\u6bcf\u65e5',avgDaily:'\u5e73\u5747\u65e5',avgMonthly:'\u5e73\u5747\u6708',
total:'\u603b\u8ba1',lastWithdrawal:'\u4e0a\u6b21\u7528\u91cf',lastMaxFlowRate:'\u6700\u5927\u6d41\u91cf',
pressureDrop:'\u538b\u964d',leakage:'\u6f0f\u6c34',leakageLevel:'\u6f0f\u6c34\u7b49\u7ea7',
measureTime:'\u6d4b\u91cf\u65f6\u95f4',wifiQuality:'WiFi\u8d28\u91cf',
co2Remaining:'CO\u2082\u5269\u4f59',filterRemaining:'\u6ee4\u82af\u5269\u4f59',co2Liters:'CO\u2082 (l)',filterLiters:'\u6ee4\u82af (l)',
cyclesCarbonated:'\u6c7d\u6c34\u5faa\u73af',cyclesStill:'\u9759\u6c34\u5faa\u73af',
waterRunCarbonated:'\u6c7d\u6c34\u65f6\u95f4',waterRunMedium:'\u4e2d\u95f4\u65f6\u95f4',waterRunStill:'\u9759\u6c34\u65f6\u95f4',
operatingTime:'\u8fd0\u884c\u65f6\u95f4',pumpRunningTime:'\u6cf5\u8fd0\u884c\u65f6\u95f4',timeSinceRestart:'\u81ea\u91cd\u542f',
maxIdleTime:'\u6700\u5927\u7a7a\u95f2',cleaningCount:'\u6e05\u6d01\u6b21\u6570',filterChangeCount:'\u6ee4\u82af\u66f4\u6362',
pumpCount:'\u6cf5\u5faa\u73af',powerCutCount:'\u65ad\u7535\u6b21\u6570',lastMeasurement:'\u6700\u540e\u6d4b\u91cf',
dateCleaning:'\u6700\u540e\u6e05\u6d01',dateCo2:'\u6700\u540e CO\u2082 \u66f4\u6362',dateFilter:'\u6700\u540e\u6ee4\u82af\u66f4\u6362',
tapType:'\u51fa\u6c34\u7c7b\u578b',tapAmount:'\u6c34\u91cf',tapTypeStill:'\u9759\u6c34',tapTypeMedium:'\u4e2d\u95f4',
tapTypeCarbonated:'\u6c7d\u6c34',notifMessage:'\u6d88\u606f',notifTime:'\u65f6\u95f4',notifCategory:'\u7c7b\u522b'}
};
var lang=(navigator.language||'en').replace('-','_').toLowerCase();
var T=STRINGS[lang]||STRINGS[lang.slice(0,2)]||STRINGS.en;
var SOCKET_TIMEOUT_MS=8000,REFRESH_INTERVAL_MS=5000;
var params=new URLSearchParams(window.location.search);
var instance=parseInt(params.get('instance')||'0',10);
if(isNaN(instance)||instance<0)instance=0;
var NS='grohe-smarthome.'+instance;
var EXCLUDED_ROOTS=['info','auth'];
var _sock=null;
function _getObject(id){var ps=_sock;if(ps&&typeof ps.getObject==='function')return ps.getObject(id);
return new Promise(function(res,rej){ps.emit('getObject',id,function(err,obj){err?rej(new Error(err)):res(obj);});});}
function _getStates(pat){var ps=_sock;if(ps&&typeof ps.getStates==='function')return ps.getStates(pat);
return new Promise(function(res,rej){ps.emit('getForeignStates',pat,function(err,st){err?rej(new Error(err)):res(st||{});});});}
function initSocket(){
try{var ps=window.parent&&window.parent!==window&&window.parent.socket;
if(ps&&(typeof ps.getObject==='function'||typeof ps.emit==='function')){_sock=ps;return Promise.resolve();}}catch(_e){}
if(typeof io==='undefined')return Promise.reject(new Error(T.noConn));
return new Promise(function(resolve,reject){try{var s=io.connect();
var addL=typeof s.once==='function'?s.once.bind(s):typeof s.on==='function'?s.on.bind(s):null;
if(!addL)return reject(new Error(T.noConn));
if(s.connected){_sock=s;return resolve();}
var done=false;
addL('connect',function(){if(done)return;done=true;_sock=s;resolve();});
addL('connect_error',function(e){if(done)return;done=true;reject(e);});
setTimeout(function(){if(!done){done=true;reject(new Error('Socket timeout'));}},SOCKET_TIMEOUT_MS);
}catch(e){reject(e);}});}
function getVal(st,k){var s=st[k];if(!s||s.val===null||s.val===undefined)return null;return s.val;}
function fmtNum(v,d,u){if(v===null||v===undefined)return null;var n=parseFloat(v);if(isNaN(n))return null;
return n.toFixed(d)+(u?'\u202f'+u:'');}
function fmtDate(v){if(!v)return null;try{var d=new Date(v);if(isNaN(d.getTime()))return String(v);return d.toLocaleString();}catch(_e){return String(v);}}
function fmtBool(v){if(v===null||v===undefined)return null;return v?T.yes:T.no;}
function fmtTapType(v){if(v===1)return T.tapTypeStill;if(v===2)return T.tapTypeMedium;if(v===3)return T.tapTypeCarbonated;return v!==null?String(v):null;}
function makeDot(online){var a=(online===true||online==='true');
var d=document.createElement('span');d.className='dot'+(a?'':' inactive');d.title=a?T.online:T.offline;return d;}
function makeProgressBar(val){var pct=Math.max(0,Math.min(100,parseFloat(val)||0));
var color=pct<20?'var(--danger)':pct<50?'var(--warn)':'var(--accent)';
var div=document.createElement('div');div.className='progress-wrap';
div.innerHTML='<div class="progress-track"><div class="progress-fill" style="width:'+pct.toFixed(0)+'%;background:'+color+'"></div></div>'
+'<span class="progress-label" style="color:'+color+'">'+pct.toFixed(0)+'\u202f%</span>';return div;}
function makeSection(title){var sec=document.createElement('div');sec.className='data-section';
var t=document.createElement('div');t.className='sec-title';t.textContent=title;sec.appendChild(t);
var g=document.createElement('div');g.className='prop-grid';sec.appendChild(g);return{sec:sec,grid:g};}
function addProp(grid,label,value,cls){if(value===null||value===undefined)return;
var item=document.createElement('div');item.className='prop-item';
var lbl=document.createElement('div');lbl.className='prop-label';lbl.textContent=label;
var val=document.createElement('div');val.className='prop-value'+(cls?' '+cls:'');val.textContent=value;
item.appendChild(lbl);item.appendChild(val);grid.appendChild(item);}
function addPropNode(grid,label,node){var item=document.createElement('div');item.className='prop-item';
var lbl=document.createElement('div');lbl.className='prop-label';lbl.textContent=label;
item.appendChild(lbl);item.appendChild(node);grid.appendChild(item);}
function appendStatusSection(card,s){var g=makeSection(T.secStatus);
var online=getVal(s,'status.online');
addProp(g.grid,T.online,online===null?T.na:(online?T.online:T.offline),online?'ok':'danger');
var upd=getVal(s,'status.updateAvailable');
if(upd!==null)addProp(g.grid,T.updateAvailable,fmtBool(upd),upd?'warn':null);
var wifi=getVal(s,'status.wifiQuality');if(wifi!==null)addProp(g.grid,T.wifiQuality,String(wifi));
card.appendChild(g.sec);}
function appendNotifSection(card,s){var msg=getVal(s,'notifications.latestMessage');if(!msg)return;
var g=makeSection(T.secNotification);
var catNum=getVal(s,'notifications.latestCategory');
var catName=getVal(s,'notifications.latestCategoryName')||'';
var catCls=catNum===30?'alarm':catNum===20?'warning':'info';
var row=document.createElement('div');row.className='notif-row';
var msgDiv=document.createElement('div');msgDiv.className='notif-message';
if(catName){var badge=document.createElement('span');badge.className='notif-category '+catCls;badge.textContent=catName;msgDiv.appendChild(badge);}
var sp=document.createElement('span');sp.textContent=msg;msgDiv.appendChild(sp);row.appendChild(msgDiv);
var ts=fmtDate(getVal(s,'notifications.latestTimestamp'));
if(ts){var td=document.createElement('div');td.className='notif-time';td.textContent=ts;row.appendChild(td);}
g.sec.removeChild(g.grid);g.sec.appendChild(row);card.appendChild(g.sec);}
function buildHeader(device,s,extra){var hdr=document.createElement('div');hdr.className='card-header';
hdr.appendChild(makeDot(getVal(s,'status.online')));
var ns=document.createElement('span');ns.className='card-device-name';ns.textContent=device.name;hdr.appendChild(ns);
if(extra)hdr.appendChild(extra);
var upd=getVal(s,'status.updateAvailable');
if(upd){var ub=document.createElement('span');ub.className='update-badge';ub.textContent=T.updateAvailable;hdr.appendChild(ub);}
return hdr;}
function buildSenseCard(device){var s=device.states;
var card=document.createElement('div');card.className='device-card';
card.appendChild(buildHeader(device,s,null));
var body=document.createElement('div');body.className='card-body';
var gm=makeSection(T.secMeasurements);
addProp(gm.grid,T.temperature,fmtNum(getVal(s,'temperature'),1,'\u00b0C'));
addProp(gm.grid,T.humidity,fmtNum(getVal(s,'humidity'),0,'%'));
var bat=getVal(s,'battery');if(bat!==null)addPropNode(gm.grid,T.battery,makeProgressBar(bat));
addProp(gm.grid,T.lastMeasurement,fmtDate(getVal(s,'lastMeasurement')));
body.appendChild(gm.sec);appendStatusSection(body,s);appendNotifSection(body,s);
card.appendChild(body);return card;}
function buildGuardCard(device){var s=device.states;
var card=document.createElement('div');card.className='device-card';
var valveVal=getVal(s,'valveOpen'),vb=null;
if(valveVal!==null){vb=document.createElement('span');vb.className='valve-badge '+(valveVal?'valve-badge-open':'valve-badge-closed');
var vd=document.createElement('span');vd.className='valve-badge-dot';vb.appendChild(vd);
vb.appendChild(document.createTextNode(valveVal?T.valveOpen:T.valveClosed));}
card.appendChild(buildHeader(device,s,vb));
var body=document.createElement('div');body.className='card-body';
var gm=makeSection(T.secMeasurements);
addProp(gm.grid,T.waterTemp,fmtNum(getVal(s,'temperature'),1,'\u00b0C'));
addProp(gm.grid,T.flowRate,fmtNum(getVal(s,'flowRate'),1,'l/h'));
addProp(gm.grid,T.pressure,fmtNum(getVal(s,'pressure'),2,'bar'));
addProp(gm.grid,T.lastMeasurement,fmtDate(getVal(s,'lastMeasurement')));
body.appendChild(gm.sec);
var gc=makeSection(T.secConsumption);
addProp(gc.grid,T.daily,fmtNum(getVal(s,'consumption.daily'),1,'l'));
addProp(gc.grid,T.avgDaily,fmtNum(getVal(s,'consumption.averageDaily'),1,'l'));
addProp(gc.grid,T.avgMonthly,fmtNum(getVal(s,'consumption.averageMonthly'),1,'l'));
addProp(gc.grid,T.total,fmtNum(getVal(s,'consumption.totalWaterConsumption'),1,'l'));
addProp(gc.grid,T.lastWithdrawal,fmtNum(getVal(s,'consumption.lastWaterConsumption'),1,'l'));
addProp(gc.grid,T.lastMaxFlowRate,fmtNum(getVal(s,'consumption.lastMaxFlowRate'),1,'l/h'));
body.appendChild(gc.sec);
var pmDrop=getVal(s,'pressureMeasurement.dropOfPressure');
if(pmDrop!==null){var gp=makeSection(T.secPressureMeasure);
addProp(gp.grid,T.pressureDrop,fmtNum(pmDrop,3,'bar'));
var isLeak=getVal(s,'pressureMeasurement.isLeakage');
if(isLeak!==null)addProp(gp.grid,T.leakage,fmtBool(isLeak),isLeak?'danger':'ok');
addProp(gp.grid,T.leakageLevel,getVal(s,'pressureMeasurement.leakageLevel'));
addProp(gp.grid,T.measureTime,fmtDate(getVal(s,'pressureMeasurement.startTime')));
body.appendChild(gp.sec);}
appendStatusSection(body,s);appendNotifSection(body,s);card.appendChild(body);return card;}
function buildBlueCard(device){var s=device.states;
var card=document.createElement('div');card.className='device-card';
card.appendChild(buildHeader(device,s,null));
var body=document.createElement('div');body.className='card-body';
var gr=makeSection(T.secResources);
var co2Pct=getVal(s,'remainingCo2');
var co2L=fmtNum(getVal(s,'remainingCo2Liters'),1,'l');
if(co2Pct!==null)addPropNode(gr.grid,T.co2Remaining+(co2L?' ('+co2L+')':''),makeProgressBar(co2Pct));
var filtPct=getVal(s,'remainingFilter');
var filtL=fmtNum(getVal(s,'remainingFilterLiters'),1,'l');
if(filtPct!==null)addPropNode(gr.grid,T.filterRemaining+(filtL?' ('+filtL+')':''),makeProgressBar(filtPct));
body.appendChild(gr.sec);
var gs=makeSection(T.secStatistics);
addProp(gs.grid,T.cyclesCarbonated,fmtNum(getVal(s,'cyclesCarbonated'),0,''));
addProp(gs.grid,T.cyclesStill,fmtNum(getVal(s,'cyclesStill'),0,''));
addProp(gs.grid,T.waterRunCarbonated,fmtNum(getVal(s,'waterRunningCarbonated'),0,'min'));
addProp(gs.grid,T.waterRunMedium,fmtNum(getVal(s,'waterRunningMedium'),0,'min'));
addProp(gs.grid,T.waterRunStill,fmtNum(getVal(s,'waterRunningStill'),0,'min'));
addProp(gs.grid,T.operatingTime,fmtNum(getVal(s,'operatingTime'),0,'min'));
addProp(gs.grid,T.pumpRunningTime,fmtNum(getVal(s,'pumpRunningTime'),0,'min'));
addProp(gs.grid,T.timeSinceRestart,fmtNum(getVal(s,'timeSinceRestart'),0,'min'));
addProp(gs.grid,T.maxIdleTime,fmtNum(getVal(s,'maxIdleTime'),0,'min'));
addProp(gs.grid,T.cleaningCount,fmtNum(getVal(s,'cleaningCount'),0,''));
addProp(gs.grid,T.filterChangeCount,fmtNum(getVal(s,'filterChangeCount'),0,''));
addProp(gs.grid,T.pumpCount,fmtNum(getVal(s,'pumpCount'),0,''));
addProp(gs.grid,T.powerCutCount,fmtNum(getVal(s,'powerCutCount'),0,''));
body.appendChild(gs.sec);
var gd=makeSection(T.secDates);
addProp(gd.grid,T.lastMeasurement,fmtDate(getVal(s,'lastMeasurement')));
addProp(gd.grid,T.dateCleaning,fmtDate(getVal(s,'dateCleaning')));
addProp(gd.grid,T.dateCo2,fmtDate(getVal(s,'dateCo2Replacement')));
addProp(gd.grid,T.dateFilter,fmtDate(getVal(s,'dateFilterReplacement')));
body.appendChild(gd.sec);
var tapT=getVal(s,'controls.tapType'),tapA=getVal(s,'controls.tapAmount');
if(tapT!==null||tapA!==null){var gdi=makeSection(T.secDispense);
addProp(gdi.grid,T.tapType,fmtTapType(tapT));
if(tapA!==null)addProp(gdi.grid,T.tapAmount,tapA+'\u202fml');
body.appendChild(gdi.sec);}
appendStatusSection(body,s);appendNotifSection(body,s);card.appendChild(body);return card;}
function extractDevices(states){var devices={},prefix=NS+'.';
Object.keys(states).forEach(function(sid){if(sid.indexOf(prefix)!==0)return;
var rest=sid.slice(prefix.length),parts=rest.split('.');if(parts.length<2)return;
var uuid=parts[0];if(EXCLUDED_ROOTS.indexOf(uuid)!==-1)return;
if(!devices[uuid])devices[uuid]={uuid:uuid,name:uuid,type:null,states:{}};
devices[uuid].states[parts.slice(1).join('.')]=states[sid];});
Object.keys(devices).forEach(function(uuid){var s=devices[uuid].states;
if('humidity' in s)devices[uuid].type='SENSE';
else if('flowRate' in s)devices[uuid].type='SENSE_GUARD';
else if('remainingCo2' in s||'remainingFilter' in s)devices[uuid].type='BLUE';});
return devices;}
function render(devices){
document.getElementById('loading').style.display='none';
document.getElementById('content').style.display='block';
document.getElementById('intro-text').textContent=T.intro;
document.getElementById('config-btn').textContent='\u2699\ufe0f '+T.configBtn;
document.getElementById('h-sense').textContent=T.hSense;
document.getElementById('h-guard').textContent=T.hGuard;
document.getElementById('h-blue').textContent=T.hBlue;
var sense=[],guard=[],blue=[];
Object.keys(devices).forEach(function(uuid){var d=devices[uuid];
if(d.type==='SENSE')sense.push(d);else if(d.type==='SENSE_GUARD')guard.push(d);else if(d.type==='BLUE')blue.push(d);});
function byName(a,b){return a.name<b.name?-1:a.name>b.name?1:0;}
sense.sort(byName);guard.sort(byName);blue.sort(byName);
function renderGroup(gid,cid,list,builder){var grp=document.getElementById(gid),cont=document.getElementById(cid);
cont.innerHTML='';if(list.length>0){list.forEach(function(d){cont.appendChild(builder(d));});grp.style.display='block';}
else grp.style.display='none';}
renderGroup('sense-group','sense-cards',sense,buildSenseCard);
renderGroup('guard-group','guard-cards',guard,buildGuardCard);
renderGroup('blue-group','blue-cards',blue,buildBlueCard);
var noDiv=document.getElementById('no-devices');
if(!sense.length&&!guard.length&&!blue.length){noDiv.textContent=T.noDevices;noDiv.style.display='block';}
else noDiv.style.display='none';
document.getElementById('refresh-info').textContent=T.refreshed+new Date().toLocaleTimeString();}
function showError(msg){var e=document.getElementById('error-msg');e.textContent=T.error+msg;e.style.display='block';
document.getElementById('loading').style.display='none';}
function openConfig(){var hash='tab-instances/config/system.adapter.'+NS;
try{var target=(window.parent&&window.parent!==window)?window.parent:window;
target.location.href=target.location.href.split('#')[0]+'#'+hash;}
catch(_e){window.open('/index.html#'+hash,'_blank');}}
document.getElementById('config-btn').addEventListener('click',openConfig);
function load(){_getStates(NS+'.*').then(function(states){
if(!states||Object.keys(states).length===0){render({});return;}
var devices=extractDevices(states);var uuids=Object.keys(devices);
if(!uuids.length){render({});return;}
return Promise.all(uuids.map(function(uuid){
return _getObject(NS+'.'+uuid).then(function(obj){
if(obj&&obj.common){var n=obj.common.name;
if(n&&typeof n==='object'){var lk=lang.slice(0,2);n=n[lk]||n.en||n.de||Object.values(n)[0]||uuid;}
if(n)devices[uuid].name=String(n);}}).catch(function(){});
})).then(function(){render(devices);});
}).catch(function(err){showError(err&&err.message?err.message:String(err));});}
document.getElementById('loading').textContent=T.loading;
initSocket().then(function(){load();setInterval(load,REFRESH_INTERVAL_MS);})
.catch(function(err){showError(err&&err.message?err.message:T.noConn);});
}());
</script>
