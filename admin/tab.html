<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grohe Smarthome</title>
    <script src="../../socket.io/socket.io.js"></script>
    <style>
        :root{--primary:#1565c0;--primary-dark:#0d47a1;--bg:#f5f5f5;--card-bg:#ffffff;
        --text:#212121;--text-secondary:#757575;--border:#e0e0e0;
        --success:#388e3c;--success-dark:#2e7d32;--warning:#f57c00;
        --danger:#d32f2f;--danger-dark:#b71c1c;
        --radius:8px;--shadow:0 2px 8px rgba(0,0,0,.1);}
        body.dark{--bg:#121212;--card-bg:#1e1e1e;--text:#e0e0e0;--text-secondary:#9e9e9e;
        --border:#333;--shadow:0 2px 8px rgba(0,0,0,.5);
        --success:#66bb6a;--success-dark:#43a047;--warning:#ffa726;
        --danger:#ef5350;--danger-dark:#c62828;}
        *{box-sizing:border-box;margin:0;padding:0}
        html,body{background-color:var(--bg)!important}
        body{font-family:Roboto,Arial,sans-serif;background:var(--bg)!important;color:var(--text);font-size:14px}
        /* ── TOOLBAR ── */
        #toolbar{background:var(--primary);color:#fff;padding:10px 16px;display:flex;
            align-items:center;gap:12px;flex-wrap:wrap;box-shadow:0 2px 4px rgba(0,0,0,.3)}
        #toolbar .logo{font-size:18px;font-weight:500;white-space:nowrap}
        #toolbar select{background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.4);
            border-radius:4px;padding:5px 8px;font-size:13px;cursor:pointer;min-width:200px}
        #toolbar select option{background:var(--primary-dark);color:#fff}
        #toolbar label{font-size:12px;opacity:.8;white-space:nowrap}
        #toolbar .spacer{flex:1}
        #connStatus{font-size:12px;display:flex;align-items:center;gap:5px;white-space:nowrap}
        #connStatus .dot{width:10px;height:10px;border-radius:50%;background:#9e9e9e;display:inline-block}
        #connStatus.online .dot{background:#69f0ae}
        #connStatus.offline .dot{background:#ef5350}
        .btn-toolbar{background:rgba(255,255,255,.2);color:#fff;border:1px solid rgba(255,255,255,.5);
            border-radius:4px;padding:6px 14px;font-size:13px;font-weight:500;cursor:pointer;
            white-space:nowrap;transition:background .2s;font-family:inherit}
        .btn-toolbar:hover{background:rgba(255,255,255,.35)}
        /* ── MAIN ── */
        #main{padding:16px}
        #loading{text-align:center;padding:60px;color:var(--text-secondary);font-size:16px}
        #loading::after{content:'';display:block;width:32px;height:32px;border:3px solid var(--border);
            border-top-color:var(--primary);border-radius:50%;animation:spin .9s linear infinite;margin:16px auto 0}
        @keyframes spin{to{transform:rotate(360deg)}}
        #error-msg{background:rgba(239,83,80,.12);border:1px solid rgba(239,83,80,.4);color:var(--danger);
            padding:12px 16px;border-radius:var(--radius);margin-bottom:16px;display:none;font-size:13px}
        #refresh-info{font-size:11px;color:var(--text-secondary);text-align:right;margin-top:8px}
        #placeholder{text-align:center;padding:60px 20px;color:var(--text-secondary);font-size:15px;display:none}
        /* ── DEVICE CARD ── */
        .device-card{background:var(--card-bg);border-radius:var(--radius);
            box-shadow:var(--shadow);margin-bottom:16px;overflow:hidden}
        .card-header{display:flex;align-items:center;gap:12px;padding:14px 18px;
            background:var(--primary);flex-wrap:wrap}
        .dot-status{display:inline-block;width:11px;height:11px;border-radius:50%;
            background:#69f0ae;box-shadow:0 0 5px rgba(105,240,174,.7);flex-shrink:0}
        .dot-status.inactive{background:rgba(255,255,255,.35);box-shadow:none}
        .card-device-name{font-size:16px;font-weight:700;flex:1;min-width:120px;color:#fff}
        .valve-badge{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;
            border-radius:12px;font-size:12px;font-weight:700}
        .valve-badge-open{background:rgba(105,240,174,.2);color:#b9f6ca}
        .valve-badge-closed{background:rgba(255,82,82,.25);color:#ff8a80}
        .valve-badge-dot{width:7px;height:7px;border-radius:50%;background:currentColor}
        .update-badge{display:inline-block;padding:3px 9px;border-radius:12px;font-size:11px;
            font-weight:600;background:rgba(255,193,7,.25);color:#ffe082}
        .data-section{padding:12px 18px;border-bottom:1px solid var(--border)}
        .data-section:last-child{border-bottom:none}
        .sec-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;
            color:var(--text-secondary);margin-bottom:10px;display:flex;align-items:center;gap:6px}
        .sec-title::after{content:'';flex:1;height:1px;background:var(--border)}
        .prop-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:8px 16px}
        .prop-item{display:flex;flex-direction:column;gap:2px}
        .prop-label{font-size:11px;color:var(--text-secondary);font-weight:500}
        .prop-value{font-size:13px;font-weight:600;color:var(--text)}
        .prop-value.ok{color:var(--success)}.prop-value.warn{color:var(--warning)}.prop-value.danger{color:var(--danger)}
        .progress-wrap{display:flex;align-items:center;gap:8px}
        .progress-track{flex:1;height:7px;background:var(--border);border-radius:4px;
            overflow:hidden;min-width:60px;max-width:120px}
        .progress-fill{height:100%;border-radius:4px;background:var(--primary);transition:width .4s}
        .progress-label{font-size:12px;font-weight:700;white-space:nowrap}
        .notif-row{display:flex;gap:12px;align-items:flex-start;flex-wrap:wrap}
        .notif-message{flex:1;min-width:200px}
        .notif-time{font-size:12px;color:var(--text-secondary);white-space:nowrap}
        .notif-category{display:inline-block;padding:2px 7px;border-radius:10px;font-size:11px;
            font-weight:600;margin-right:6px;background:rgba(21,101,192,.12);color:var(--primary)}
        .notif-category.alarm{background:rgba(211,47,47,.15);color:var(--danger)}
        .notif-category.warning{background:rgba(245,124,0,.15);color:var(--warning)}
        /* ── CONTROLS ── */
        .ctrl-section{padding:16px 18px;border-bottom:1px solid var(--border)}
        .ctrl-section:last-child{border-bottom:none}
        .ctrl-btns{display:flex;flex-wrap:wrap;gap:10px;margin-top:10px}
        .ctrl-field-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-top:10px}
        .ctrl-field-group{display:flex;flex-direction:column;gap:4px}
        .ctrl-field-label{font-size:11px;color:var(--text-secondary);font-weight:500}
        .btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;
            padding:8px 18px;border:none;border-radius:4px;font-size:14px;font-weight:500;
            cursor:pointer;transition:background .2s,opacity .2s;font-family:inherit;white-space:nowrap}
        .btn-primary{background:var(--primary);color:#fff}
        .btn-primary:hover:not(:disabled){background:var(--primary-dark)}
        .btn-success{background:var(--success);color:#fff}
        .btn-success:hover:not(:disabled){background:var(--success-dark)}
        .btn-danger{background:var(--danger);color:#fff}
        .btn-danger:hover:not(:disabled){background:var(--danger-dark)}
        .btn:disabled{opacity:.38;cursor:not-allowed}
        .ctrl-select,.ctrl-input{padding:7px 10px;border-radius:4px;border:1px solid var(--border);
            background:var(--card-bg);color:var(--text);font-size:14px;font-family:inherit}
        .ctrl-select:focus,.ctrl-input:focus{outline:none;border-color:var(--primary)}
        .ctrl-select:disabled,.ctrl-input:disabled{opacity:.38;cursor:not-allowed}
        .ctrl-input{width:100px}
        .offline-hint{display:flex;align-items:center;gap:6px;font-size:13px;font-weight:600;
            color:var(--danger);padding:8px 12px;border-radius:4px;
            background:rgba(211,47,47,.08);border-left:3px solid var(--danger);margin-top:6px}
        body.dark .offline-hint{background:rgba(239,83,80,.12)}
        /* ── TOAST ── */
        #toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);
            background:#323232;color:#fff;padding:10px 24px;border-radius:4px;font-size:14px;
            transition:transform .3s;z-index:9999;pointer-events:none;box-shadow:0 4px 12px rgba(0,0,0,.4)}
        #toast.show{transform:translateX(-50%) translateY(0)}
        #toast.error{background:var(--danger)}
        #toast.success{background:var(--success)}
        @media(max-width:480px){#main{padding:10px}}
    </style>
</head>
<body>
<div id="toast"></div>
<div id="error-msg"></div>
<!-- TOOLBAR -->
<div id="toolbar">
    <div class="logo">&#128167; Grohe Smarthome</div>
    <div>
        <label for="deviceSelect" id="lbl-device"></label>
        <select id="deviceSelect"><option value="">&#8212;</option></select>
    </div>
    <div class="spacer"></div>
    <button class="btn-toolbar" id="config-btn"></button>
    <div id="connStatus">
        <span class="dot"></span><span id="connLabel"></span>
    </div>
</div>
<!-- MAIN -->
<div id="main">
    <div id="loading"></div>
    <div id="placeholder"></div>
    <div id="device-detail" style="display:none">
        <div id="device-card-container"></div>
    </div>
    <div id="refresh-info"></div>
</div>

addProp(gm.grid,T.pressure,fmtNum(getVal(s,'pressure'),2,'bar'));
addProp(gm.grid,T.lastMeasurement,fmtDate(getVal(s,'lastMeasurement')));
body.appendChild(gm.sec);
var gc=makeSection(T.secConsumption);
addProp(gc.grid,T.daily,fmtNum(getVal(s,'consumption.daily'),1,'l'));
addProp(gc.grid,T.avgDaily,fmtNum(getVal(s,'consumption.averageDaily'),1,'l'));
addProp(gc.grid,T.avgMonthly,fmtNum(getVal(s,'consumption.averageMonthly'),1,'l'));
addProp(gc.grid,T.total,fmtNum(getVal(s,'consumption.totalWaterConsumption'),1,'l'));
addProp(gc.grid,T.lastWithdrawal,fmtNum(getVal(s,'consumption.lastWaterConsumption'),1,'l'));
addProp(gc.grid,T.lastMaxFlowRate,fmtNum(getVal(s,'consumption.lastMaxFlowRate'),1,'l/h'));
body.appendChild(gc.sec);
var pmDrop=getVal(s,'pressureMeasurement.dropOfPressure');
if(pmDrop!==null){var gp=makeSection(T.secPressureMeasure);
addProp(gp.grid,T.pressureDrop,fmtNum(pmDrop,3,'bar'));
var isLeak=getVal(s,'pressureMeasurement.isLeakage');
if(isLeak!==null)addProp(gp.grid,T.leakage,fmtBool(isLeak),isLeak?'danger':'ok');
addProp(gp.grid,T.leakageLevel,getVal(s,'pressureMeasurement.leakageLevel'));
addProp(gp.grid,T.measureTime,fmtDate(getVal(s,'pressureMeasurement.startTime')));
body.appendChild(gp.sec);}
appendGuardControls(card,device.uuid,s);appendStatusSection(body,s);appendNotifSection(body,s);card.appendChild(body);return card;}
function buildBlueCard(device){var s=device.states;
var card=document.createElement('div');card.className='device-card';
card.appendChild(buildHeader(device,s,null));
var body=document.createElement('div');body.className='card-body';
var gr=makeSection(T.secResources);
var co2Pct=getVal(s,'remainingCo2');
var co2L=fmtNum(getVal(s,'remainingCo2Liters'),1,'l');
if(co2Pct!==null)addPropNode(gr.grid,T.co2Remaining+(co2L?' ('+co2L+')':''),makeProgressBar(co2Pct));
var filtPct=getVal(s,'remainingFilter');
var filtL=fmtNum(getVal(s,'remainingFilterLiters'),1,'l');
if(filtPct!==null)addPropNode(gr.grid,T.filterRemaining+(filtL?' ('+filtL+')':''),makeProgressBar(filtPct));
body.appendChild(gr.sec);
var gs=makeSection(T.secStatistics);
addProp(gs.grid,T.cyclesCarbonated,fmtNum(getVal(s,'cyclesCarbonated'),0,''));
addProp(gs.grid,T.cyclesStill,fmtNum(getVal(s,'cyclesStill'),0,''));
addProp(gs.grid,T.waterRunCarbonated,fmtNum(getVal(s,'waterRunningCarbonated'),0,'min'));
addProp(gs.grid,T.waterRunMedium,fmtNum(getVal(s,'waterRunningMedium'),0,'min'));
addProp(gs.grid,T.waterRunStill,fmtNum(getVal(s,'waterRunningStill'),0,'min'));
addProp(gs.grid,T.operatingTime,fmtNum(getVal(s,'operatingTime'),0,'min'));
addProp(gs.grid,T.pumpRunningTime,fmtNum(getVal(s,'pumpRunningTime'),0,'min'));
addProp(gs.grid,T.timeSinceRestart,fmtNum(getVal(s,'timeSinceRestart'),0,'min'));
addProp(gs.grid,T.maxIdleTime,fmtNum(getVal(s,'maxIdleTime'),0,'min'));
addProp(gs.grid,T.cleaningCount,fmtNum(getVal(s,'cleaningCount'),0,''));
addProp(gs.grid,T.filterChangeCount,fmtNum(getVal(s,'filterChangeCount'),0,''));
addProp(gs.grid,T.pumpCount,fmtNum(getVal(s,'pumpCount'),0,''));
addProp(gs.grid,T.powerCutCount,fmtNum(getVal(s,'powerCutCount'),0,''));
body.appendChild(gs.sec);
var gd=makeSection(T.secDates);
addProp(gd.grid,T.lastMeasurement,fmtDate(getVal(s,'lastMeasurement')));
addProp(gd.grid,T.dateCleaning,fmtDate(getVal(s,'dateCleaning')));
addProp(gd.grid,T.dateCo2,fmtDate(getVal(s,'dateCo2Replacement')));
addProp(gd.grid,T.dateFilter,fmtDate(getVal(s,'dateFilterReplacement')));
body.appendChild(gd.sec);
var tapT=getVal(s,'controls.tapType'),tapA=getVal(s,'controls.tapAmount');
if(tapT!==null||tapA!==null){var gdi=makeSection(T.secDispense);
addProp(gdi.grid,T.tapType,fmtTapType(tapT));
if(tapA!==null)addProp(gdi.grid,T.tapAmount,tapA+'\u202fml');
body.appendChild(gdi.sec);}
appendBlueControls(card,device.uuid,s);appendStatusSection(body,s);appendNotifSection(body,s);card.appendChild(body);return card;}
function extractDevices(states){var devices={},prefix=NS+'.';
Object.keys(states).forEach(function(sid){if(sid.indexOf(prefix)!==0)return;
var rest=sid.slice(prefix.length),parts=rest.split('.');if(parts.length<2)return;
var uuid=parts[0];if(EXCLUDED_ROOTS.indexOf(uuid)!==-1)return;
if(!devices[uuid])devices[uuid]={uuid:uuid,name:uuid,type:null,states:{}};
devices[uuid].states[parts.slice(1).join('.')]=states[sid];});
Object.keys(devices).forEach(function(uuid){var s=devices[uuid].states;
if('humidity' in s)devices[uuid].type='SENSE';
else if('flowRate' in s)devices[uuid].type='SENSE_GUARD';
else if('remainingCo2' in s||'remainingFilter' in s)devices[uuid].type='BLUE';});
return devices;}
function render(devices){
_devices=devices;
var sel=document.getElementById('deviceSelect');
var prevUuid=_selectedUuid||sel.value||null;
// Build device list sorted by name
var list=Object.keys(devices).map(function(u){return devices[u];}).sort(function(a,b){return a.name.localeCompare(b.name);});
// Rebuild dropdown only if device list changed
var uuids=list.map(function(d){return d.uuid;});
var existing=Array.prototype.slice.call(sel.options).slice(1).map(function(o){return o.value;});
var changed=existing.length!==uuids.length||uuids.some(function(u,i){return u!==existing[i];});
if(changed){
while(sel.options.length>1)sel.remove(1);
list.forEach(function(d){
var opt=document.createElement('option');opt.value=d.uuid;
var typeLabel=d.type==='SENSE'?T.hSense:d.type==='SENSE_GUARD'?T.hGuard:d.type==='BLUE'?T.hBlue:'';
opt.textContent=d.name;opt.title=typeLabel;
sel.appendChild(opt);});}
// Restore or keep selection
if(prevUuid&&devices[prevUuid]){sel.value=prevUuid;_selectedUuid=prevUuid;}
else if(list.length>0){sel.value=list[0].uuid;_selectedUuid=list[0].uuid;}
// Refresh displayed device
if(_selectedUuid&&devices[_selectedUuid]){showDeviceCard(_selectedUuid);}
else{document.getElementById('placeholder').style.display='block';
document.getElementById('device-detail').style.display='none';}
document.getElementById('loading').style.display='none';
document.getElementById('refresh-info').textContent=T.refreshed+new Date().toLocaleTimeString();}
function showDeviceCard(uuid){var d=_devices[uuid];if(!d)return;
var cont=document.getElementById('device-card-container');cont.innerHTML='';
var card=d.type==='SENSE'?buildSenseCard(d):d.type==='SENSE_GUARD'?buildGuardCard(d):d.type==='BLUE'?buildBlueCard(d):null;
if(card)cont.appendChild(card);
document.getElementById('placeholder').style.display='none';
document.getElementById('device-detail').style.display='block';}
function onDeviceChange(){var sel=document.getElementById('deviceSelect');
_selectedUuid=sel.value||null;
if(_selectedUuid&&_devices[_selectedUuid])showDeviceCard(_selectedUuid);
else{document.getElementById('placeholder').style.display='block';
document.getElementById('device-detail').style.display='none';}}
function showError(msg){var e=document.getElementById('error-msg');e.textContent=T.error+msg;e.style.display='block';
document.getElementById('loading').style.display='none';setConnStatus(false);}
function openConfig(){var hash='tab-instances/config/system.adapter.'+NS;
try{var target=(window.parent&&window.parent!==window)?window.parent:window;
target.location.href=target.location.href.split('#')[0]+'#'+hash;}
catch(_e){window.open('/index.html#'+hash,'_blank');}}
function load(){_getStates(NS+'.*').then(function(states){
if(!states||Object.keys(states).length===0){render({});return;}
var devices=extractDevices(states);var uuids=Object.keys(devices);
if(!uuids.length){render({});return;}
return Promise.all(uuids.map(function(uuid){
return _getObject(NS+'.'+uuid).then(function(obj){
if(obj&&obj.common){var n=obj.common.name;
if(n&&typeof n==='object'){var lk=lang.slice(0,2);n=n[lk]||n.en||n.de||Object.values(n)[0]||uuid;}
if(n)devices[uuid].name=String(n);}}).catch(function(){});
})).then(function(){render(devices);});
}).catch(function(err){showError(err&&err.message?err.message:String(err));});}
// Init
document.getElementById('loading').textContent=T.loading;
document.getElementById('placeholder').textContent=T.selectDevice;
document.getElementById('lbl-device').textContent=T.deviceLabel;
document.getElementById('config-btn').textContent='\u2699\ufe0f '+T.configBtn;
document.getElementById('config-btn').addEventListener('click',openConfig);
document.getElementById('deviceSelect').addEventListener('change',onDeviceChange);
// ── Dark-mode detection (matches reference ioBroker.schlueter-thermostat) ──
var DARK_THEME_NAMES=['dark','blue'];
function applyTheme(isDark){document.body.classList.toggle('dark',!!isDark);}
function resolveTheme(){
try{var t=localStorage.getItem('App.theme');if(t)return t==='dark';
var n=localStorage.getItem('App.themeName');if(n)return DARK_THEME_NAMES.indexOf(n)>=0;}catch(_e){}
try{var body=window.parent&&window.parent.document&&window.parent.document.body;
var html=window.parent&&window.parent.document&&window.parent.document.documentElement;
if(body){if((body.className||'').toLowerCase().indexOf('dark')>=0)return true;
if(html&&(html.className||'').toLowerCase().indexOf('dark')>=0)return true;
if(body.getAttribute('data-theme')==='dark')return true;
if(html&&html.getAttribute('data-theme')==='dark')return true;
if(body.getAttribute('data-bs-theme')==='dark')return true;}}catch(_e){}
try{var p=window.parent;var candidates=[
p&&p.document&&p.document.getElementById('root'),
p&&p.document&&p.document.querySelector('.App'),
p&&p.document&&p.document.body].filter(Boolean);
for(var i=0;i<candidates.length;i++){var bg=p.getComputedStyle(candidates[i]).backgroundColor;
var m=bg&&bg.match(/[\d.]+/g);if(m&&m.length>=3){var a=m.length>=4?parseFloat(m[3]):1;
if(a>0){var avg=(parseInt(m[0])+parseInt(m[1])+parseInt(m[2]))/3;if(avg<80)return true;}}}}catch(_e){}
return false;}
function detectTheme(){try{var params=new URLSearchParams(window.location.search);
var react=params.get('react');if(react!==null){applyTheme(DARK_THEME_NAMES.indexOf(react)>=0);return;}}catch(_e){}
applyTheme(resolveTheme());}
function watchTheme(){
window.addEventListener('storage',function(e){if(e.key==='App.theme'){applyTheme(e.newValue==='dark');}
else if(e.key==='App.themeName'){applyTheme(DARK_THEME_NAMES.indexOf(e.newValue)>=0);}});
window.addEventListener('message',function(e){if(e.data==='updateTheme')applyTheme(resolveTheme());});
try{var targets=[window.parent&&window.parent.document&&window.parent.document.body,
window.parent&&window.parent.document&&window.parent.document.documentElement].filter(Boolean);
if(targets.length){var obs=new MutationObserver(function(){applyTheme(resolveTheme());});
for(var i=0;i<targets.length;i++){obs.observe(targets[i],{attributes:true,attributeFilter:['class','data-theme','data-bs-theme','style']});}}}catch(_e){}
var _lastDark=document.body.classList.contains('dark');
setInterval(function(){var d=resolveTheme();if(d!==_lastDark){_lastDark=d;applyTheme(d);}},5000);}
detectTheme();watchTheme();
initSocket().then(function(){setConnStatus(true);load();setInterval(load,REFRESH_INTERVAL_MS);})
.catch(function(err){showError(err&&err.message?err.message:T.noConn);});
}());
</script>
